name: Tests

on:
  push:
    branches: [main, develop, contrib/stharrold]
  pull_request:
    branches: [main, develop, contrib/stharrold]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          load: true
          tags: yuimedi-paper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run pytest
        run: docker run --rm yuimedi-paper:latest uv run pytest -m "not integration and not benchmark"

      - name: Run linting (ruff)
        run: docker run --rm yuimedi-paper:latest uv run ruff check .
